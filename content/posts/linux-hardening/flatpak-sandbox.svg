<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg5)" rx="16"/>

  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Flatpak Sandbox: app isolata vs app tradizionale</text>

  <!-- LEFT: Traditional app -->
  <text x="200" y="65" text-anchor="middle" fill="#ef4444" font-size="15" font-weight="bold">App tradizionale (.deb/.rpm)</text>

  <rect x="40" y="80" width="320" height="310" rx="12" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- App box -->
  <rect x="120" y="100" width="160" height="40" rx="8" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="200" y="125" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="600">Firefox .deb</text>

  <!-- Access arrows (all red/allowed) -->
  <line x1="200" y1="140" x2="100" y2="180" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="200" y2="180" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="300" y2="180" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="55" y="180" width="100" height="35" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="105" y="202" text-anchor="middle" fill="#fca5a5" font-size="11">~/Documenti</text>

  <rect x="160" y="180" width="80" height="35" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="202" text-anchor="middle" fill="#fca5a5" font-size="11">~/.ssh</text>

  <rect x="245" y="180" width="100" height="35" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="295" y="202" text-anchor="middle" fill="#fca5a5" font-size="11">~/.gnupg</text>

  <line x1="200" y1="215" x2="100" y2="250" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="200" y1="215" x2="200" y2="250" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="200" y1="215" x2="300" y2="250" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="55" y="250" width="100" height="35" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="105" y="272" text-anchor="middle" fill="#fca5a5" font-size="11">Webcam</text>

  <rect x="160" y="250" width="80" height="35" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="272" text-anchor="middle" fill="#fca5a5" font-size="11">Rete</text>

  <rect x="245" y="250" width="100" height="35" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="295" y="272" text-anchor="middle" fill="#fca5a5" font-size="11">D-Bus</text>

  <rect x="100" y="310" width="200" height="30" rx="6" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="330" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">Accesso completo al sistema</text>

  <!-- DIVIDER -->
  <line x1="400" y1="60" x2="400" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="410" text-anchor="middle" fill="#475569" font-size="11">vs</text>

  <!-- RIGHT: Flatpak app -->
  <text x="600" y="65" text-anchor="middle" fill="#22c55e" font-size="15" font-weight="bold">App Flatpak (sandboxed)</text>

  <rect x="440" y="80" width="320" height="310" rx="12" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Sandbox border -->
  <rect x="460" y="90" width="280" height="160" rx="10" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="600" y="108" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">SANDBOX (namespace + seccomp)</text>

  <!-- App box -->
  <rect x="520" y="115" width="160" height="40" rx="8" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="600" y="140" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="600">Firefox Flatpak</text>

  <!-- Controlled access -->
  <line x1="550" y1="155" x2="510" y2="185" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="650" y1="155" x2="690" y2="185" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>

  <rect x="470" y="185" width="100" height="30" rx="6" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="520" y="205" text-anchor="middle" fill="#86efac" font-size="11">~/Downloads</text>

  <rect x="640" y="185" width="90" height="30" rx="6" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="685" y="205" text-anchor="middle" fill="#ef4444" font-size="11">~/.ssh ✗</text>

  <!-- Outside sandbox -->
  <line x1="600" y1="250" x2="510" y2="290" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="600" y1="250" x2="600" y2="290" stroke="#eab308" stroke-width="1.5"/>
  <line x1="600" y1="250" x2="690" y2="290" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>

  <rect x="470" y="290" width="90" height="30" rx="6" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="515" y="310" text-anchor="middle" fill="#86efac" font-size="11">Audio ✓</text>

  <rect x="555" y="290" width="90" height="30" rx="6" fill="#eab308" fill-opacity="0.15" stroke="#eab308" stroke-width="1"/>
  <text x="600" y="310" text-anchor="middle" fill="#eab308" font-size="11">Rete (ask)</text>

  <rect x="650" y="290" width="90" height="30" rx="6" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="695" y="310" text-anchor="middle" fill="#ef4444" font-size="11">D-Bus ✗</text>

  <rect x="500" y="340" width="200" height="30" rx="6" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="360" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">Solo permessi espliciti</text>
</svg>
