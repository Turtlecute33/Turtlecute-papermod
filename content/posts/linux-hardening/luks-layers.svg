<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="700" height="350" fill="url(#bg4)" rx="16"/>

  <text x="350" y="35" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Come funziona la cifratura disco con LUKS</text>

  <!-- Physical disk -->
  <rect x="40" y="60" width="620" height="60" rx="12" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="2"/>
  <text x="60" y="85" fill="#ef4444" font-size="14" font-weight="600">Disco fisico (SSD/HDD)</text>
  <text x="60" y="105" fill="#fca5a5" font-size="11">Dati cifrati — illeggibili senza la passphrase</text>
  <rect x="430" y="70" width="210" height="35" rx="6" fill="#1a1a2e" stroke="#475569" stroke-width="1">
  </rect>
  <text x="535" y="92" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">4f 7a 2b e1 9c 3d a8 f0 ...</text>

  <!-- LUKS header -->
  <rect x="40" y="140" width="620" height="55" rx="12" fill="#eab308" fill-opacity="0.1" stroke="#eab308" stroke-width="2"/>
  <text x="60" y="165" fill="#eab308" font-size="14" font-weight="600">LUKS Header</text>
  <text x="60" y="183" fill="#fde047" font-size="11">Master key cifrata + metadati + salt + iterazioni</text>
  <rect x="430" y="148" width="100" height="32" rx="5" fill="#eab308" fill-opacity="0.2" stroke="#eab308" stroke-width="1"/>
  <text x="480" y="168" text-anchor="middle" fill="#eab308" font-size="10">Key Slot 0</text>
  <rect x="540" y="148" width="100" height="32" rx="5" fill="#eab308" fill-opacity="0.1" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="590" y="168" text-anchor="middle" fill="#64748b" font-size="10">Key Slot 1</text>

  <!-- Arrow: passphrase -->
  <rect x="250" y="210" width="200" height="35" rx="18" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="350" y="232" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">La tua passphrase</text>
  <line x1="350" y1="245" x2="350" y2="270" stroke="#22c55e" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Decrypted -->
  <rect x="40" y="270" width="620" height="55" rx="12" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="2"/>
  <text x="60" y="295" fill="#22c55e" font-size="14" font-weight="600">Volume decifrato (dm-crypt)</text>
  <text x="60" y="313" fill="#86efac" font-size="11">Filesystem leggibile — /home, /var, swap... i tuoi dati</text>
  <rect x="480" y="280" width="160" height="32" rx="5" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="560" y="300" text-anchor="middle" fill="#86efac" font-size="10" font-family="monospace">/dev/mapper/root</text>

  <!-- Lock icons -->
  <text x="20" y="95" fill="#ef4444" font-size="22">&#x1F512;</text>
  <text x="20" y="305" fill="#22c55e" font-size="22">&#x1F513;</text>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
