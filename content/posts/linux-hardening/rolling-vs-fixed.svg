<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="16"/>

  <text x="400" y="40" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">Rolling Release vs Fixed Release</text>

  <!-- Timeline -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#334155" stroke-width="2"/>
  <text x="80" y="225" fill="#64748b" font-size="11">Gen</text>
  <text x="240" y="225" fill="#64748b" font-size="11">Apr</text>
  <text x="400" y="225" fill="#64748b" font-size="11">Lug</text>
  <text x="560" y="225" fill="#64748b" font-size="11">Ott</text>
  <text x="700" y="225" fill="#64748b" font-size="11">Dic</text>

  <!-- Rolling release (top) -->
  <text x="80" y="80" fill="#22c55e" font-size="16" font-weight="bold">Rolling Release (Fedora, Arch)</text>
  <text x="80" y="100" fill="#86efac" font-size="12">Aggiornamenti continui alla versione upstream</text>

  <!-- Green dots for rolling -->
  <circle cx="100" cy="160" r="6" fill="#22c55e"/>
  <circle cx="140" cy="160" r="6" fill="#22c55e"/>
  <circle cx="180" cy="160" r="6" fill="#22c55e"/>
  <circle cx="220" cy="160" r="6" fill="#22c55e"/>
  <circle cx="260" cy="160" r="6" fill="#22c55e"/>
  <circle cx="300" cy="160" r="6" fill="#22c55e"/>
  <circle cx="340" cy="160" r="6" fill="#22c55e"/>
  <circle cx="380" cy="160" r="6" fill="#22c55e"/>
  <circle cx="420" cy="160" r="6" fill="#22c55e"/>
  <circle cx="460" cy="160" r="6" fill="#22c55e"/>
  <circle cx="500" cy="160" r="6" fill="#22c55e"/>
  <circle cx="540" cy="160" r="6" fill="#22c55e"/>
  <circle cx="580" cy="160" r="6" fill="#22c55e"/>
  <circle cx="620" cy="160" r="6" fill="#22c55e"/>
  <circle cx="660" cy="160" r="6" fill="#22c55e"/>
  <circle cx="700" cy="160" r="6" fill="#22c55e"/>
  <line x1="100" y1="160" x2="700" y2="160" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <text x="400" y="150" text-anchor="middle" fill="#22c55e" font-size="10">patch → patch → patch → patch (versione upstream)</text>

  <!-- Fixed release (bottom) -->
  <text x="80" y="270" fill="#ef4444" font-size="16" font-weight="bold">Fixed Release (Debian Stable)</text>
  <text x="80" y="290" fill="#fca5a5" font-size="12">Pacchetti congelati + backport selettivi</text>

  <!-- Red sparse dots for fixed -->
  <rect x="90" y="310" width="120" height="20" rx="4" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="150" y="324" text-anchor="middle" fill="#ef4444" font-size="10">versione congelata</text>

  <circle cx="250" cy="320" r="6" fill="#f97316"/>
  <text x="250" y="345" text-anchor="middle" fill="#f97316" font-size="9">backport</text>

  <circle cx="370" cy="320" r="6" fill="#f97316"/>
  <text x="370" y="345" text-anchor="middle" fill="#f97316" font-size="9">backport</text>

  <rect x="440" y="310" width="80" height="20" rx="4" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="480" y="324" text-anchor="middle" fill="#fca5a5" font-size="9">CVE mancanti</text>

  <circle cx="570" cy="320" r="6" fill="#f97316"/>
  <text x="570" y="345" text-anchor="middle" fill="#f97316" font-size="9">backport</text>

  <rect x="620" y="310" width="80" height="20" rx="4" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="660" y="324" text-anchor="middle" fill="#fca5a5" font-size="9">CVE mancanti</text>

  <!-- Legend -->
  <text x="400" y="390" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Le fix senza CVE non vengono backportate → finestre di vulnerabilità</text>
</svg>
