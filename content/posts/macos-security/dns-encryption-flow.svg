<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bgd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bgd)" rx="12"/>

  <text x="400" y="38" fill="#cdd6f4" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">DNS: PRIMA E DOPO LA CRITTOGRAFIA</text>
  <line x1="220" y1="48" x2="580" y2="48" stroke="#45475a" stroke-width="1"/>

  <!-- BEFORE - Unencrypted -->
  <text x="200" y="85" fill="#f38ba8" font-size="14" font-weight="600" text-anchor="middle">❌ DNS Standard (Porta 53)</text>

  <!-- Your Mac -->
  <rect x="30" y="100" width="120" height="55" rx="8" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="90" y="123" fill="#cdd6f4" font-size="12" font-weight="600" text-anchor="middle">🖥️ Il tuo Mac</text>
  <text x="90" y="140" fill="#a6adc8" font-size="10" text-anchor="middle">Query DNS</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="127" x2="195" y2="127" stroke="#f38ba8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="195,122 205,127 195,132" fill="#f38ba8"/>

  <!-- ISP/Spy -->
  <rect x="205" y="100" width="130" height="55" rx="8" fill="#45475a" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="270" y="120" fill="#f38ba8" font-size="11" font-weight="600" text-anchor="middle">👁️ ISP / Intercettatore</text>
  <text x="270" y="138" fill="#f38ba8" font-size="10" text-anchor="middle" opacity="0.8">Legge TUTTO in chiaro</text>

  <!-- Arrow 2 -->
  <line x1="335" y1="127" x2="375" y2="127" stroke="#f38ba8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="375,122 385,127 375,132" fill="#f38ba8"/>

  <!-- DNS Server -->
  <rect x="385" y="100" width="120" height="55" rx="8" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="445" y="123" fill="#cdd6f4" font-size="12" font-weight="600" text-anchor="middle">🗄️ Server DNS</text>
  <text x="445" y="140" fill="#a6adc8" font-size="10" text-anchor="middle">ISP default</text>

  <!-- Exposed data box -->
  <rect x="545" y="96" width="220" height="65" rx="8" fill="#f38ba8" opacity="0.08" stroke="#f38ba8" stroke-width="1"/>
  <text x="555" y="115" fill="#f38ba8" font-size="11" font-weight="600">Dati esposti:</text>
  <text x="555" y="132" fill="#f38ba8" font-size="10" opacity="0.8">• Tutti i siti che visitate</text>
  <text x="555" y="147" fill="#f38ba8" font-size="10" opacity="0.8">• Orari di navigazione</text>

  <!-- Divider -->
  <line x1="40" y1="185" x2="760" y2="185" stroke="#45475a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="200" fill="#45475a" font-size="11" text-anchor="middle" font-style="italic">vs.</text>

  <!-- AFTER - Encrypted -->
  <text x="200" y="235" fill="#a6e3a1" font-size="14" font-weight="600" text-anchor="middle">✅ DNS Crittografato (DoH/DoT)</text>

  <!-- Your Mac -->
  <rect x="30" y="250" width="120" height="55" rx="8" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="90" y="273" fill="#cdd6f4" font-size="12" font-weight="600" text-anchor="middle">🖥️ Il tuo Mac</text>
  <text x="90" y="290" fill="#a6adc8" font-size="10" text-anchor="middle">DNSCrypt</text>

  <!-- Arrow 1 - encrypted -->
  <rect x="155" y="266" width="55" height="22" rx="4" fill="#a6e3a1" opacity="0.15"/>
  <text x="182" y="281" fill="#a6e3a1" font-size="10" font-weight="600" text-anchor="middle">🔒 TLS</text>
  <line x1="150" y1="277" x2="155" y2="277" stroke="#a6e3a1" stroke-width="2"/>
  <line x1="210" y1="277" x2="215" y2="277" stroke="#a6e3a1" stroke-width="2"/>

  <!-- ISP/Spy - blocked -->
  <rect x="215" y="250" width="130" height="55" rx="8" fill="#45475a" stroke="#585b70" stroke-width="1" opacity="0.5"/>
  <text x="280" y="270" fill="#585b70" font-size="11" font-weight="600" text-anchor="middle">👁️ ISP / Intercettatore</text>
  <text x="280" y="288" fill="#a6e3a1" font-size="10" text-anchor="middle">Vede solo rumore 🔒</text>

  <!-- Arrow 2 - encrypted -->
  <rect x="350" y="266" width="55" height="22" rx="4" fill="#a6e3a1" opacity="0.15"/>
  <text x="377" y="281" fill="#a6e3a1" font-size="10" font-weight="600" text-anchor="middle">🔒 TLS</text>
  <line x1="345" y1="277" x2="350" y2="277" stroke="#a6e3a1" stroke-width="2"/>
  <line x1="405" y1="277" x2="410" y2="277" stroke="#a6e3a1" stroke-width="2"/>

  <!-- Secure DNS Server -->
  <rect x="410" y="250" width="120" height="55" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="470" y="273" fill="#a6e3a1" font-size="12" font-weight="600" text-anchor="middle">🗄️ Quad9 / Next</text>
  <text x="470" y="290" fill="#a6adc8" font-size="10" text-anchor="middle">DNS sicuro</text>

  <!-- Protected data box -->
  <rect x="555" y="246" width="220" height="65" rx="8" fill="#a6e3a1" opacity="0.08" stroke="#a6e3a1" stroke-width="1"/>
  <text x="565" y="265" fill="#a6e3a1" font-size="11" font-weight="600">Protezione ottenuta:</text>
  <text x="565" y="282" fill="#a6e3a1" font-size="10" opacity="0.8">• Query DNS cifrate end-to-end</text>
  <text x="565" y="297" fill="#a6e3a1" font-size="10" opacity="0.8">• ISP non può leggere o alterare</text>

  <!-- Setup hint -->
  <rect x="100" y="335" width="600" height="55" rx="10" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="400" y="355" fill="#89b4fa" font-size="12" font-weight="600" text-anchor="middle">⚡ Setup consigliato: DNSCrypt + Dnsmasq (cache locale) + profilo DoH</text>
  <text x="400" y="375" fill="#a6adc8" font-size="11" text-anchor="middle">Installabili via Homebrew: brew install dnscrypt-proxy dnsmasq</text>

  <!-- Footer -->
  <text x="400" y="410" fill="#45475a" font-size="10" text-anchor="middle">turtlecute.org</text>
</svg>
