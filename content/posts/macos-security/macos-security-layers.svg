  <text x="110" y="142" fill="#cba6f7" font-size="13" font-weight="600">🛡️ Firewall (pf + LuLu)</text>

  <!-- Layer 4 -->
  <rect x="120" y="160" width="560" height="260" rx="12" fill="none" stroke="url(#layer4)" stroke-width="2" opacity="0.6"/>
  <rect x="130" y="168" width="220" height="28" rx="6" fill="#89b4fa" opacity="0.15"/>
  <text x="140" y="187" fill="#89b4fa" font-size="13" font-weight="600">🌐 DNS Crittografato + VPN/Tor</text>

