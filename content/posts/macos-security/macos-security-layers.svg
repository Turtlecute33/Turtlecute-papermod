  <text x="720" y="138" fill="#585b70" font-size="11" text-anchor="end" font-style="italic">Livello Rete</text>
  <text x="720" y="183" fill="#585b70" font-size="11" text-anchor="end" font-style="italic">Livello Trasporto</text>
  <text x="720" y="228" fill="#585b70" font-size="11" text-anchor="end" font-style="italic">Livello Sistema</text>
  <text x="720" y="273" fill="#585b70" font-size="11" text-anchor="end" font-style="italic">Livello Disco</text>
  <text x="720" y="330" fill="#585b70" font-size="11" text-anchor="end" font-style="italic">Livello Hardware</text>

  <!-- Footer -->
  <text x="400" y="475" fill="#45475a" font-size="11" text-anchor="middle">turtlecute.org — Sicurezza a strati: ogni livello protegge quello sottostante</text>
