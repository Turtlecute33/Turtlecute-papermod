  <line x1="250" y1="52" x2="550" y2="52" stroke="#45475a" stroke-width="1"/>

  <!-- Layer 6 - outermost -->
  <rect x="60" y="70" width="680" height="380" rx="16" fill="none" stroke="url(#layer6)" stroke-width="2" opacity="0.6"/>
  <rect x="70" y="78" width="200" height="28" rx="6" fill="#f5c2e7" opacity="0.15"/>
  <text x="80" y="97" fill="#f5c2e7" font-size="13" font-weight="600">🔒 App Sandbox + Hardened RT</text>

  <!-- Layer 5 -->
  <rect x="90" y="115" width="620" height="320" rx="14" fill="none" stroke="url(#layer5)" stroke-width="2" opacity="0.6"/>
