  <rect x="160" y="213" width="260" height="28" rx="6" fill="#a6e3a1" opacity="0.15"/>
  <text x="170" y="232" fill="#a6e3a1" font-size="13" font-weight="600">✅ System Integrity Protection (SIP)</text>

  <!-- Layer 2 -->
  <rect x="180" y="250" width="440" height="140" rx="8" fill="none" stroke="url(#layer2)" stroke-width="2" opacity="0.6"/>
  <rect x="190" y="258" width="200" height="28" rx="6" fill="#fab387" opacity="0.15"/>
  <text x="200" y="277" fill="#fab387" font-size="13" font-weight="600">🔐 FileVault + Lockdown Mode</text>

  <!-- Layer 1 - innermost -->
  <rect x="210" y="295" width="380" height="80" rx="8" fill="url(#layer1)" opacity="0.12" stroke="url(#layer1)" stroke-width="2"/>
  <text x="400" y="325" fill="#f38ba8" font-size="15" font-weight="700" text-anchor="middle">🍎 Apple Silicon Secure Enclave</text>
  <text x="400" y="348" fill="#f38ba8" font-size="12" text-anchor="middle" opacity="0.8">Hardware root of trust • Secure Boot • Touch ID</text>

