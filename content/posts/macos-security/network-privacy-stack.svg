<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bgn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgn)" rx="12"/>

  <text x="400" y="38" fill="#cdd6f4" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">STACK DI PRIVACY DELLA RETE</text>
  <line x1="250" y1="48" x2="550" y2="48" stroke="#45475a" stroke-width="1"/>

  <!-- Your Mac -->
  <rect x="30" y="160" width="110" height="130" rx="10" fill="#313244" stroke="#cdd6f4" stroke-width="1.5"/>
  <text x="85" y="195" fill="#cdd6f4" font-size="28" text-anchor="middle">🖥️</text>
  <text x="85" y="220" fill="#cdd6f4" font-size="12" font-weight="600" text-anchor="middle">Il tuo Mac</text>
  <text x="85" y="240" fill="#a6adc8" font-size="9" text-anchor="middle">Firewall pf</text>
  <text x="85" y="255" fill="#a6adc8" font-size="9" text-anchor="middle">+ LuLu</text>
  <text x="85" y="270" fill="#a6adc8" font-size="9" text-anchor="middle">+ DNSCrypt</text>

  <!-- Arrow to VPN -->
  <line x1="140" y1="225" x2="185" y2="225" stroke="#a6e3a1" stroke-width="2"/>
  <polygon points="185,220 195,225 185,230" fill="#a6e3a1"/>
  <rect x="148" y="210" width="35" height="14" rx="3" fill="#a6e3a1" opacity="0.15"/>
  <text x="165" y="220" fill="#a6e3a1" font-size="8" font-weight="600" text-anchor="middle">WG</text>

  <!-- VPN Server -->
  <rect x="195" y="170" width="120" height="110" rx="10" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="255" y="205" fill="#a6e3a1" font-size="24" text-anchor="middle">🔒</text>
  <text x="255" y="225" fill="#a6e3a1" font-size="12" font-weight="600" text-anchor="middle">VPN Server</text>
  <text x="255" y="242" fill="#a6adc8" font-size="9" text-anchor="middle">WireGuard</text>
  <text x="255" y="257" fill="#a6adc8" font-size="9" text-anchor="middle">+ Pi-hole</text>
  <text x="255" y="272" fill="#a6adc8" font-size="9" text-anchor="middle">Il tuo IP nascosto</text>

  <!-- Arrow to Tor -->
  <line x1="315" y1="225" x2="365" y2="225" stroke="#cba6f7" stroke-width="2"/>
  <polygon points="365,220 375,225 365,230" fill="#cba6f7"/>
  <text x="340" y="215" fill="#cba6f7" font-size="8" font-weight="600" text-anchor="middle">opzionale</text>

  <!-- Tor Network -->
  <rect x="375" y="140" width="140" height="170" rx="10" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="445" y="172" fill="#cba6f7" font-size="24" text-anchor="middle">🧅</text>
  <text x="445" y="192" fill="#cba6f7" font-size="12" font-weight="600" text-anchor="middle">Rete Tor</text>

  <!-- Tor nodes -->
  <rect x="390" y="205" width="115" height="20" rx="4" fill="#cba6f7" opacity="0.1"/>
  <text x="447" y="219" fill="#cba6f7" font-size="9" text-anchor="middle">Guard Node 🔒</text>
  <rect x="390" y="230" width="115" height="20" rx="4" fill="#cba6f7" opacity="0.08"/>
  <text x="447" y="244" fill="#cba6f7" font-size="9" text-anchor="middle">Middle Relay 🔒</text>
  <rect x="390" y="255" width="115" height="20" rx="4" fill="#cba6f7" opacity="0.06"/>
  <text x="447" y="269" fill="#cba6f7" font-size="9" text-anchor="middle">Exit Node 🔓</text>

  <text x="445" y="296" fill="#a6adc8" font-size="9" text-anchor="middle">3 strati di cifratura</text>

  <!-- Arrow to Internet -->
  <line x1="515" y1="225" x2="565" y2="225" stroke="#89b4fa" stroke-width="2"/>
  <polygon points="565,220 575,225 565,230" fill="#89b4fa"/>

  <!-- Internet / Destination -->
  <rect x="575" y="170" width="120" height="110" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="635" y="205" fill="#89b4fa" font-size="24" text-anchor="middle">🌍</text>
  <text x="635" y="225" fill="#89b4fa" font-size="12" font-weight="600" text-anchor="middle">Internet</text>
  <text x="635" y="242" fill="#a6adc8" font-size="9" text-anchor="middle">Il sito vede</text>
  <text x="635" y="257" fill="#a6adc8" font-size="9" text-anchor="middle">solo l'IP di Tor</text>
  <text x="635" y="272" fill="#a6adc8" font-size="9" text-anchor="middle">o della VPN</text>

  <!-- Bottom legend -->
  <rect x="60" y="345" width="680" height="75" rx="10" fill="#313244" stroke="#45475a" stroke-width="1"/>

  <text x="400" y="367" fill="#cdd6f4" font-size="12" font-weight="600" text-anchor="middle">Livelli di protezione (cumulabili)</text>

  <circle cx="110" cy="393" r="6" fill="#a6e3a1" opacity="0.3" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="125" y="397" fill="#a6e3a1" font-size="10">VPN — Nasconde IP, cifra traffico dall'ISP</text>

  <circle cx="400" cy="393" r="6" fill="#cba6f7" opacity="0.3" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="415" y="397" fill="#cba6f7" font-size="10">Tor — Anonimato, 3 strati di cifratura</text>

  <circle cx="110" cy="410" r="6" fill="#89b4fa" opacity="0.3" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="125" y="414" fill="#89b4fa" font-size="10">DNS crittografato — Protegge le query</text>

  <circle cx="400" cy="410" r="6" fill="#f38ba8" opacity="0.3" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="415" y="414" fill="#f38ba8" font-size="10">Firewall (pf + LuLu) — Blocca traffico non autorizzato</text>

  <text x="400" y="443" fill="#45475a" font-size="10" text-anchor="middle">turtlecute.org</text>
</svg>
