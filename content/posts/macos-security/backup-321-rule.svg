  <rect x="150" y="315" width="500" height="25" rx="6" fill="#f38ba8" opacity="0.08" stroke="#f38ba8" stroke-width="1"/>
  <text x="400" y="332" fill="#f38ba8" font-size="11" font-weight="600" text-anchor="middle">⚠️ Regola d'oro: cifrate SEMPRE prima di spostare i dati fuori dal Mac</text>

  <text x="400" y="348" fill="#45475a" font-size="10" text-anchor="middle">turtlecute.org</text>
