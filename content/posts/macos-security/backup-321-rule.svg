<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bgb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
  </defs>

  <rect width="800" height="350" fill="url(#bgb)" rx="12"/>

  <text x="400" y="38" fill="#cdd6f4" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">LA REGOLA DEL BACKUP 3-2-1</text>
  <line x1="250" y1="48" x2="550" y2="48" stroke="#45475a" stroke-width="1"/>

  <!-- 3 Copies -->
  <rect x="40" y="75" width="220" height="225" rx="12" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <rect x="40" y="75" width="220" height="40" rx="12" fill="#a6e3a1" opacity="0.1"/>
  <text x="150" y="100" fill="#a6e3a1" font-size="28" font-weight="800" text-anchor="middle">3</text>
  <text x="150" y="130" fill="#a6e3a1" font-size="14" font-weight="600" text-anchor="middle">COPIE DEI DATI</text>

  <rect x="60" y="150" width="180" height="35" rx="6" fill="#a6e3a1" opacity="0.08"/>
  <text x="70" y="172" fill="#cdd6f4" font-size="11">💻 Originale sul Mac</text>

  <rect x="60" y="195" width="180" height="35" rx="6" fill="#a6e3a1" opacity="0.08"/>
  <text x="70" y="217" fill="#cdd6f4" font-size="11">💾 Backup Time Machine</text>

  <rect x="60" y="240" width="180" height="35" rx="6" fill="#a6e3a1" opacity="0.08"/>
  <text x="70" y="262" fill="#cdd6f4" font-size="11">🔒 Archivio GPG cifrato</text>

  <!-- 2 Media Types -->
  <rect x="290" y="75" width="220" height="225" rx="12" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <rect x="290" y="75" width="220" height="40" rx="12" fill="#89b4fa" opacity="0.1"/>
  <text x="400" y="100" fill="#89b4fa" font-size="28" font-weight="800" text-anchor="middle">2</text>
  <text x="400" y="130" fill="#89b4fa" font-size="14" font-weight="600" text-anchor="middle">TIPI DI SUPPORTO</text>

  <rect x="310" y="155" width="180" height="55" rx="6" fill="#89b4fa" opacity="0.08"/>
  <text x="400" y="177" fill="#cdd6f4" font-size="11" text-anchor="middle">🖥️ Disco interno (SSD)</text>
  <text x="400" y="197" fill="#a6adc8" font-size="9" text-anchor="middle">Supporto primario</text>

  <rect x="310" y="220" width="180" height="55" rx="6" fill="#89b4fa" opacity="0.08"/>
  <text x="400" y="242" fill="#cdd6f4" font-size="11" text-anchor="middle">💾 Disco esterno USB</text>
  <text x="400" y="262" fill="#a6adc8" font-size="9" text-anchor="middle">Supporto secondario cifrato</text>

  <!-- 1 Offsite -->
  <rect x="540" y="75" width="220" height="225" rx="12" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
  <rect x="540" y="75" width="220" height="40" rx="12" fill="#fab387" opacity="0.1"/>
  <text x="650" y="100" fill="#fab387" font-size="28" font-weight="800" text-anchor="middle">1</text>
  <text x="650" y="130" fill="#fab387" font-size="14" font-weight="600" text-anchor="middle">COPIA OFFSITE</text>

  <rect x="560" y="155" width="180" height="55" rx="6" fill="#fab387" opacity="0.08"/>
  <text x="650" y="177" fill="#cdd6f4" font-size="11" text-anchor="middle">☁️ Cloud E2EE</text>
  <text x="650" y="197" fill="#a6adc8" font-size="9" text-anchor="middle">Tresorit / restic + B2</text>

  <text x="650" y="232" fill="#a6adc8" font-size="10" text-anchor="middle">— oppure —</text>

  <rect x="560" y="245" width="180" height="40" rx="6" fill="#fab387" opacity="0.08"/>
  <text x="650" y="270" fill="#cdd6f4" font-size="11" text-anchor="middle">🏠 Disco a casa di un amico</text>

