<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bgt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bgt)" rx="12"/>

  <text x="400" y="38" fill="#cdd6f4" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1">THREAT MODEL: LIVELLI DI AVVERSARIO</text>
  <line x1="220" y1="48" x2="580" y2="48" stroke="#45475a" stroke-width="1"/>

  <!-- Sophistication axis -->
  <line x1="60" y1="360" x2="740" y2="360" stroke="#45475a" stroke-width="1.5"/>
  <polygon points="740,355 755,360 740,365" fill="#45475a"/>
  <text x="755" y="378" fill="#585b70" font-size="10" font-style="italic">Sofisticazione</text>

  <!-- Y axis -->
  <line x1="60" y1="360" x2="60" y2="65" stroke="#45475a" stroke-width="1.5"/>
  <polygon points="55,65 60,50 65,65" fill="#45475a"/>
  <text x="30" y="55" fill="#585b70" font-size="10" font-style="italic" text-anchor="middle">Rischio</text>

  <!-- Level 1: Roommate -->
  <rect x="80" y="280" width="120" height="65" rx="10" fill="#a6e3a1" opacity="0.08" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="140" y="300" fill="#a6e3a1" font-size="22" text-anchor="middle">👤</text>
  <text x="140" y="318" fill="#a6e3a1" font-size="11" font-weight="600" text-anchor="middle">Coinquilino</text>
  <text x="140" y="335" fill="#a6adc8" font-size="9" text-anchor="middle">Password + blocco</text>
  <text x="140" y="347" fill="#a6adc8" font-size="9" text-anchor="middle">schermo</text>

  <!-- Level 2: Thief -->
  <rect x="225" y="225" width="120" height="65" rx="10" fill="#f9e2af" opacity="0.08" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="285" y="245" fill="#f9e2af" font-size="22" text-anchor="middle">🥷</text>
  <text x="285" y="263" fill="#f9e2af" font-size="11" font-weight="600" text-anchor="middle">Ladro</text>
  <text x="285" y="280" fill="#a6adc8" font-size="9" text-anchor="middle">FileVault + Find My</text>

  <!-- Level 3: Criminal -->
  <rect x="370" y="170" width="120" height="65" rx="10" fill="#fab387" opacity="0.08" stroke="#fab387" stroke-width="1.5"/>
  <text x="430" y="190" fill="#fab387" font-size="22" text-anchor="middle">💀</text>
  <text x="430" y="208" fill="#fab387" font-size="11" font-weight="600" text-anchor="middle">Criminale</text>
  <text x="430" y="225" fill="#a6adc8" font-size="9" text-anchor="middle">Firewall + Sandbox</text>

  <!-- Level 4: Corporation -->
  <rect x="515" y="120" width="120" height="65" rx="10" fill="#f38ba8" opacity="0.08" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="575" y="140" fill="#f38ba8" font-size="22" text-anchor="middle">🏢</text>
  <text x="575" y="158" fill="#f38ba8" font-size="11" font-weight="600" text-anchor="middle">Corporazione</text>
  <text x="575" y="175" fill="#a6adc8" font-size="9" text-anchor="middle">DNS cifrato + VPN</text>

  <!-- Level 5: Nation State -->
  <rect x="660" y="70" width="120" height="65" rx="10" fill="#cba6f7" opacity="0.08" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="720" y="90" fill="#cba6f7" font-size="22" text-anchor="middle">🏛️</text>
  <text x="720" y="108" fill="#cba6f7" font-size="11" font-weight="600" text-anchor="middle">Stato / APT</text>
  <text x="720" y="125" fill="#a6adc8" font-size="9" text-anchor="middle">Tor + E2EE + Diceware</text>

  <!-- Connecting line -->
  <line x1="140" y1="280" x2="285" y2="230" stroke="#45475a" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="285" y1="225" x2="430" y2="175" stroke="#45475a" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="430" y1="170" x2="575" y2="125" stroke="#45475a" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="575" y1="120" x2="720" y2="75" stroke="#45475a" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Legend -->
  <text x="400" y="392" fill="#45475a" font-size="10" text-anchor="middle">turtlecute.org — Adattate le difese al vostro avversario reale, non a quello immaginario</text>
