# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposeed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://turtlecute.org"
title: Turtlecute.org
defaultContentLanguage: it
languageCode: it-IT
timeZone: Europe/Rome
theme: [WonderMod]

enableInlineShortcodes: true
enableRobotsTXT: true
enableGitInfo: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

sitemap:
  changefreq: weekly
  priority: 0.5

minify:
  disableXML: true
  minifyOutput: true

languages:
  it:
    languageName: "Italiano"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
      #  - name: Tags
      #    url: tags/
      #   weight: 10
        - name: Search
          url: search/
          weight: 10
        - name: Chi Sono
          url: about/
          weight: 20

    # custom params for each language should be under [langcode].parms - hugo v0.120.0
    params:
      languageAltTitle: Italiano
      profileMode:
        enabled: true
        title: Turtlecute
        imageUrl: "/coin.gif"
        imageTitle: ProfileMode image
        # imageWidth: 120
        # imageHeight: 120
        subtitle: "🔒 Privacy | ⚡ Bitcoin | 🛡️ Sicurezza"
        buttons:
          - name: Guide
            url: posts
          - name: Servizi
            url: https://shop.priorato.org
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production 
  description: "Guide su bitcoin, sicurezza e privacy in lingua italiana"
  author: Turtlecute
  # author: ["Me", "You"] # multiple authors
  defaultTheme: dark
  disableThemeToggle: false
  ShowShareButtons: false
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  # comments: false
  images: ["/turtlecute.png"]

  schema:
    sameAs:
      - "https://github.com/Turtlecute33"
      - "https://x.com/turtlecute33"
      - "https://t.me/turtlecute33"
      - "https://instagram.com/turtlecute33"

  profileMode:
    enabled: false
    title: PaperMod
    imageUrl: "#"
    imageTitle: my image
    # imageWidth: 120
    # imageHeight: 120
    buttons:
      - name: Archives
        url: archives
      - name: Tags
        url: tags

  socialIcons:
    - name: github
      title: View Source on Github
      url: "https://github.com/Turtlecute33"
    - name: telegram
      title: Contact me
      url: "https://t.me/turtlecute33"
    - name: X
      title: Share PaperMod on X/Twitter
      url: "https://x.com/turtlecute33"
    - name: email
      title: Email
      url: "mailto:turtlecute@proton.me"
    - name: instagram
      title: Instagram account
      url: "https://instagram.com/turtlecute33"
 
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.1
    minMatchCharLength: 1
    limit: 5  # Refer to https://www.fusejs.io/api/methods.html#search
    keys: ["title", "content"]

  assets:
    disableHLJS: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

  cover:
    images: ["/turtlecute.png"]

markup:
    highlight:
        style: dracula
        lineNos: false
        noClasses: false
        guessSyntax: true
    goldmark:
        renderer:
            unsafe: true

# privacy:
